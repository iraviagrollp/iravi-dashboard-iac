name: Terraform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Stage 1: Validate ────────────────────────────────────────────────────────
  # Runs on every PR. No AWS credentials needed.
  # Catches formatting issues and config errors before review.
  validate:
    name: Format & Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write  # needed to post PR comments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Format Check
        id: fmt
        # -diff shows exactly which lines need changing if the check fails
        run: terraform fmt --check --recursive -diff
        working-directory: terraform/environments/production
        continue-on-error: true

      - name: Terraform Init (no backend — no AWS needed)
        id: init
        run: terraform init -backend=false
        working-directory: terraform/environments/production

      - name: Terraform Validate
        id: validate
        run: terraform validate
        working-directory: terraform/environments/production

      # Posts a summary comment on the PR showing fmt/validate results
      - name: Post results to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fmt      = '${{ steps.fmt.outcome }}';
            const init     = '${{ steps.init.outcome }}';
            const validate = '${{ steps.validate.outcome }}';

            const icon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';

            const body = `## Terraform Checks
            | Step | Result |
            |---|---|
            | Format | ${icon(fmt)} \`${fmt}\` |
            | Init | ${icon(init)} \`${init}\` |
            | Validate | ${icon(validate)} \`${validate}\` |

            ${fmt !== 'success' ? '> ⚠️ **Format failed** — see the `Terraform Format Check` step in the [Actions log](' + context.payload.pull_request.html_url + '/checks) for the exact diff of what needs fixing. Run `terraform fmt --recursive` locally to auto-fix.' : ''}
            > **Plan** will be added once AWS credentials (OIDC) are configured.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # Fail the job if fmt or validate failed (after posting the comment)
      - name: Fail if checks did not pass
        if: steps.fmt.outcome != 'success' || steps.validate.outcome != 'success'
        run: exit 1

