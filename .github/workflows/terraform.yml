name: Terraform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Stage 1: Validate ────────────────────────────────────────────────────────
  # Runs on every PR. No AWS credentials needed.
  # Catches formatting issues and config errors before review.
  validate:
    name: Format & Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write  # needed to post PR comments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout business-core
        uses: actions/checkout@v4
        with:
          repository: iraviagrollp/business-core
          path: business-core

      - name: Link business-core to expected relative path
        run: ln -s "$GITHUB_WORKSPACE/business-core" "$GITHUB_WORKSPACE/../business-core"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Format Check
        id: fmt
        # -diff shows exactly which lines need changing if the check fails
        run: terraform fmt --check --recursive -diff
        working-directory: terraform/environments/production
        continue-on-error: true

      - name: Terraform Init (no backend — no AWS needed)
        id: init
        run: terraform init -backend=false
        working-directory: terraform/environments/production

      - name: Terraform Validate
        id: validate
        run: terraform validate
        working-directory: terraform/environments/production

      # Posts a summary comment on the PR showing fmt/validate results
      - name: Post results to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fmt      = '${{ steps.fmt.outcome }}';
            const init     = '${{ steps.init.outcome }}';
            const validate = '${{ steps.validate.outcome }}';

            const icon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';

            const body = `## Terraform Checks
            | Step | Result |
            |---|---|
            | Format | ${icon(fmt)} \`${fmt}\` |
            | Init | ${icon(init)} \`${init}\` |
            | Validate | ${icon(validate)} \`${validate}\` |

            ${fmt !== 'success' ? '> ⚠️ **Format failed** — see the `Terraform Format Check` step in the [Actions log](' + context.payload.pull_request.html_url + '/checks) for the exact diff of what needs fixing. Run `terraform fmt --recursive` locally to auto-fix.' : ''}
            > **Plan** output is posted below by the plan job.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # Fail the job if fmt or validate failed (after posting the comment)
      - name: Fail if checks did not pass
        if: steps.fmt.outcome != 'success' || steps.validate.outcome != 'success'
        run: exit 1

  # ── Stage 2: Plan ────────────────────────────────────────────────────────────
  # Runs on every PR after validate passes.
  # Posts the terraform plan output as a PR comment.
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write   # required for OIDC
      contents: read
      pull-requests: write

    env:
      TF_VAR_alert_email:          ${{ secrets.TF_VAR_alert_email }}
      TF_VAR_dashboard_username:   ${{ secrets.TF_VAR_dashboard_username }}
      TF_VAR_dashboard_password:   ${{ secrets.TF_VAR_dashboard_password }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout business-core
        uses: actions/checkout@v4
        with:
          repository: iraviagrollp/business-core
          path: business-core

      - name: Link business-core to expected relative path
        run: ln -s "$GITHUB_WORKSPACE/business-core" "$GITHUB_WORKSPACE/../business-core"

      - name: Build etl_stocks layer
        run: |
          mkdir -p terraform/environments/production/.lambda_layers/etl_stocks/python
          pip install \
            -r business-core/lambda/etl_stocks/requirements.txt \
            -t terraform/environments/production/.lambda_layers/etl_stocks/python \
            --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 \
            --only-binary=:all: --upgrade --quiet

      - name: Build api-deps layer
        run: |
          mkdir -p terraform/environments/production/.lambda_layers/api_deps/python
          pip install \
            -r business-core/lambda/api/requirements.txt \
            -t terraform/environments/production/.lambda_layers/api_deps/python \
            --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 \
            --only-binary=:all: --upgrade --quiet

      - name: Build etl_customer_ledger layer
        run: |
          mkdir -p terraform/environments/production/.lambda_layers/etl_customer_ledger/python
          pip install \
            -r business-core/lambda/etl_customer_ledger/requirements.txt \
            -t terraform/environments/production/.lambda_layers/etl_customer_ledger/python \
            --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 \
            --only-binary=:all: --upgrade --quiet

      - name: Build etl_customer_accounts layer
        run: |
          mkdir -p terraform/environments/production/.lambda_layers/etl_customer_accounts/python
          pip install \
            -r business-core/lambda/etl_customer_accounts/requirements.txt \
            -t terraform/environments/production/.lambda_layers/etl_customer_accounts/python \
            --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 \
            --only-binary=:all: --upgrade --quiet

      - name: Build etl_appendix_b_x11 layer
        run: |
          mkdir -p terraform/environments/production/.lambda_layers/etl_appendix_b_x11/python
          pip install \
            -r business-core/lambda/etl_appendix_b_x11/requirements.txt \
            -t terraform/environments/production/.lambda_layers/etl_appendix_b_x11/python \
            --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 \
            --only-binary=:all: --upgrade --quiet

      - name: Build etl_appendix_b_x11_purchase layer
        run: |
          mkdir -p terraform/environments/production/.lambda_layers/etl_appendix_b_x11_purchase/python
          pip install \
            -r business-core/lambda/etl_appendix_b_x11_purchase/requirements.txt \
            -t terraform/environments/production/.lambda_layers/etl_appendix_b_x11_purchase/python \
            --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 \
            --only-binary=:all: --upgrade --quiet

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/production

      - name: Terraform Plan
        id: plan
        continue-on-error: true
        run: terraform plan -no-color 2>&1 | tee plan.txt
        working-directory: terraform/environments/production

      - name: Post plan to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = 'terraform/environments/production/plan.txt';
            const plan = fs.existsSync(planPath)
              ? fs.readFileSync(planPath, 'utf8')
              : 'Plan output not available — check the Terraform Plan step in the Actions log for errors.';
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Fail if plan failed
        if: steps.plan.outcome != 'success'
        run: exit 1

  # ── Stage 3: Apply ───────────────────────────────────────────────────────────
  # Triggered on merge to main but waits for manual approval before running.
  # Approve via GitHub Actions UI: Actions tab → the workflow run → Review deployments.
  # Configure approvers: GitHub repo → Settings → Environments → production → Required reviewers.
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      id-token: write
      contents: read

    env:
      TF_VAR_alert_email:          ${{ secrets.TF_VAR_alert_email }}
      TF_VAR_dashboard_username:   ${{ secrets.TF_VAR_dashboard_username }}
      TF_VAR_dashboard_password:   ${{ secrets.TF_VAR_dashboard_password }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout business-core
        uses: actions/checkout@v4
        with:
          repository: iraviagrollp/business-core
          path: business-core

      - name: Link business-core to expected relative path
        run: ln -s "$GITHUB_WORKSPACE/business-core" "$GITHUB_WORKSPACE/../business-core"

      - name: Build etl_stocks layer
        run: |
          mkdir -p terraform/environments/production/.lambda_layers/etl_stocks/python
          pip install \
            -r business-core/lambda/etl_stocks/requirements.txt \
            -t terraform/environments/production/.lambda_layers/etl_stocks/python \
            --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 \
            --only-binary=:all: --upgrade --quiet

      - name: Build api-deps layer
        run: |
          mkdir -p terraform/environments/production/.lambda_layers/api_deps/python
          pip install \
            -r business-core/lambda/api/requirements.txt \
            -t terraform/environments/production/.lambda_layers/api_deps/python \
            --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 \
            --only-binary=:all: --upgrade --quiet

      - name: Build etl_customer_ledger layer
        run: |
          mkdir -p terraform/environments/production/.lambda_layers/etl_customer_ledger/python
          pip install \
            -r business-core/lambda/etl_customer_ledger/requirements.txt \
            -t terraform/environments/production/.lambda_layers/etl_customer_ledger/python \
            --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 \
            --only-binary=:all: --upgrade --quiet

      - name: Build etl_customer_accounts layer
        run: |
          mkdir -p terraform/environments/production/.lambda_layers/etl_customer_accounts/python
          pip install \
            -r business-core/lambda/etl_customer_accounts/requirements.txt \
            -t terraform/environments/production/.lambda_layers/etl_customer_accounts/python \
            --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 \
            --only-binary=:all: --upgrade --quiet

      - name: Build etl_appendix_b_x11 layer
        run: |
          mkdir -p terraform/environments/production/.lambda_layers/etl_appendix_b_x11/python
          pip install \
            -r business-core/lambda/etl_appendix_b_x11/requirements.txt \
            -t terraform/environments/production/.lambda_layers/etl_appendix_b_x11/python \
            --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 \
            --only-binary=:all: --upgrade --quiet

      - name: Build etl_appendix_b_x11_purchase layer
        run: |
          mkdir -p terraform/environments/production/.lambda_layers/etl_appendix_b_x11_purchase/python
          pip install \
            -r business-core/lambda/etl_appendix_b_x11_purchase/requirements.txt \
            -t terraform/environments/production/.lambda_layers/etl_appendix_b_x11_purchase/python \
            --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 \
            --only-binary=:all: --upgrade --quiet

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/production

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform/environments/production
